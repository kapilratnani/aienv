name: frontend-design
agent: opencode
model: claude-sonnet-4-5
description: Frontend component development with design system access and UI best practices

mcp:
  figma:
    type: remote
    url: "https://mcp.figma.com/v1"
    headers:
      Authorization: "Bearer {env:FIGMA_ACCESS_TOKEN}"
  shadcn:
    type: local
    command: ["npx", "-y", "@shadcn/mcp-server"]
  tailwind:
    type: local
    command: ["npx", "-y", "@tailwind/mcp-server"]
  storybook:
    type: local
    command: ["npx", "-y", "@storybook/mcp-server", "--dir", "./.storybook"]

skills:
  - name: frontend-design
    source: registry
    package: anthropics/skills
  - name: web-design-guidelines
    source: registry
    package: vercel-labs/agent-skills
  - name: shadcn
    source: registry
    package: shadcn/ui
  - name: ui-ux-pro-max
    source: registry
    package: nextlevelbuilder/ui-ux-pro-max-skill

rules:
  - path: ./docs/component-architecture.md
  - path: ./docs/accessibility-standards.md
  - path: ./docs/design-tokens.md
  - path: ./AGENTS.md
