<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="container" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff00" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#00ff00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="120" height="120" rx="20" fill="#0a0a0f" />
  
  <!-- Container/Sandbox Outline -->
  <path d="M 20 40 L 20 80 A 10 10 0 0 0 30 90 L 90 90 A 10 10 0 0 0 100 80 L 100 40" 
        fill="none" stroke="url(#container)" stroke-width="2" filter="url(#glow)" />
  <path d="M 20 40 L 50 30 L 110 30 L 100 40" 
        fill="none" stroke="url(#container)" stroke-width="2" filter="url(#glow)" />
  <line x1="100" y1="40" x2="110" y2="30" stroke="url(#container)" stroke-width="2" filter="url(#glow)" />
  
  <!-- Left Bracket -->
  <path d="M 35 50 L 35 80" stroke="url(#container)" stroke-width="2" filter="url(#glow)" opacity="0.6" />
  <line x1="35" y1="50" x2="45" y2="50" stroke="url(#container)" stroke-width="2" filter="url(#glow)" opacity="0.6" />
  <line x1="35" y1="80" x2="45" y2="80" stroke="url(#container)" stroke-width="2" filter="url(#glow)" opacity="0.6" />
  
  <!-- Right Bracket -->
  <path d="M 85 50 L 85 80" stroke="url(#container)" stroke-width="2" filter="url(#glow)" opacity="0.6" />
  <line x1="85" y1="50" x2="75" y2="50" stroke="url(#container)" stroke-width="2" filter="url(#glow)" opacity="0.6" />
  <line x1="85" y1="80" x2="75" y2="80" stroke="url(#container)" stroke-width="2" filter="url(#glow)" opacity="0.6" />
  
  <!-- AI Core (Eye) -->
  <circle cx="60" cy="65" r="8" fill="none" stroke="url(#core)" stroke-width="2" filter="url(#glow)" />
  <circle cx="60" cy="65" r="3" fill="url(#core)" filter="url(#glow)" />
  
  <!-- Circuit Lines -->
  <path d="M 60 52 L 60 45" stroke="url(#core)" stroke-width="1" filter="url(#glow)" opacity="0.8" />
  <path d="M 48 65 L 40 65" stroke="url(#core)" stroke-width="1" filter="url(#glow)" opacity="0.8" />
  <path d="M 72 65 L 80 65" stroke="url(#core)" stroke-width="1" filter="url(#glow)" opacity="0.8" />
  <path d="M 60 78 L 60 85" stroke="url(#core)" stroke-width="1" filter="url(#glow)" opacity="0.8" />
</svg>